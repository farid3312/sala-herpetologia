<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Administrador</title>
    <link rel="icon" href="{{ url_for('static', path='favicon.ico') }}" type="image/x-icon">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Imagen de fondo para el Panel Admin */
            background-image: url("{{ url_for('static', path='fondo admin.png') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Botón de Inicio en la esquina superior izquierda */
        .btn-home {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #2c5364;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .btn-home:hover {
            background-color: #1d3a47;
            transform: scale(1.05);
        }

        .admin-container {
            background: rgba(255, 255, 255, 0.92);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 700px;
            text-align: center;
            margin: 60px 20px;
        }

        h1 { color: #2c5364; margin-bottom: 10px; }
        
        .status-tag {
            display: inline-block;
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .menu-item {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
            transition: 0.3s;
            cursor: pointer;
        }

        .menu-item:hover {
            border-color: #2c5364;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-logout {
            display: inline-block;
            margin-top: 40px;
            color: #c62828;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border: 1px solid #c62828;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background-color: #c62828;
            color: white;
        }

        /* Responsividad */
        @media (max-width: 600px) {
            .admin-container { padding: 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <a href="{{ url_for('inicio') }}" class="btn-home">🏠 Inicio</a>

    <div class="admin-container">
        <div class="status-tag">Conectado como Administrador</div>
        <h1>Panel de Gestión</h1>
        <p>Bienvenido al sistema de administración del Museo Herpetológico.</p>
        
        <div class="menu-grid">
            <div class="menu-item">
                <h3>📦 Importar Datos</h3>
                <p>Cargar archivos Excel o CSV.</p>
            </div>
            <div class="menu-item">
                <h3>🦎 Nueva Especie</h3>
                <p>Ingresar registro individual.</p>
            </div>
            <div class="menu-item">
                <h3>📊 Ver Catálogo</h3>
                <p>Gestionar especies existentes.</p>
            </div>
        </div>

        <a href="{{ url_for('logout') }}" class="btn-logout">Cerrar Sesión Segura</a>
    </div>
</body>
</html>
