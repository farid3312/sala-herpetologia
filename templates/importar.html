{% extends "base.html" %} 

{% block content %}
<style>
    body {
        /* Cambia 'fondo.png' por el nombre real de tu imagen en la carpeta static */
        background-image: url("{{ url_for('static', path='fondoimportar.png') }}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }
    /* Hacemos la tarjeta un poco transparente para que se vea el fondo */
    .card.shadow {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(5px);
    }
</style>

<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow border-0 rounded-lg">
      <div class="card-header bg-primary text-white text-center">
        <h5 class="mb-0">Importación Masiva de Catálogo (CSV)</h5>
      </div>
      <div class="card-body p-4">
        <p class="text-muted small text-center mb-4">
          Selecciona el archivo corregido con el formato oficial.
        </p>
        <form id="uploadForm">
          <div class="mb-4">
            <input
              class="form-control form-control-lg"
              type="file"
              id="csvFile"
              accept=".csv"
              required
            />
          </div>
          <button type="submit" class="btn btn-success btn-lg w-100 fw-bold" id="btnImportar">
            Iniciar Carga en PostgreSQL
          </button>
        </form>
        <div id="statusMessage" class="mt-3"></div>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById("uploadForm").onsubmit = async (e) => {
    e.preventDefault();
    const fileInput = document.getElementById("csvFile");
    const btn = document.getElementById("btnImportar");
    const status = document.getElementById("statusMessage");

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    btn.disabled = true;
    status.innerHTML =
      '<div class="alert alert-info fw-bold">⏳ Procesando archivo...</div>';

    try {
      const response = await fetch("/admin/datos/importar-csv/", {
        method: "POST",
        body: formData,
      });
      const result = await response.json();

      if (response.ok) {
        const nuevos = result.detalles ? result.detalles.registros_nuevos : 0;
        status.innerHTML = `<div class="alert alert-success shadow-sm">
                <strong>✅ ¡Éxito!</strong> ${result.mensaje}<br>
                Registros procesados: ${nuevos}
            </div>`;
      } else {
        throw new Error(result.detail || "Error en el servidor");
      }
    } catch (error) {
      status.innerHTML = `<div class="alert alert-danger shadow-sm"><strong>❌ Error:</strong> ${error.message}</div>`;
    } finally {
      btn.disabled = false;
    }
  };
</script>
{% endblock %}
