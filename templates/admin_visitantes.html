<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas de Visitantes</title>
    <link rel="icon" href="{{ url_for('static', path='favicon.ico') }}" type="image/x-icon" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{{ url_for('static', path='fondo admin.webp') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .btn-back {
            position: fixed; top: 20px; left: 20px;
            background-color: #2c5364; color: white; padding: 10px 18px;
            border-radius: 8px; font-weight: bold; text-decoration: none; border: none;
        }
        .container { max-width: 800px; margin-top: 50px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95); border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); padding: 30px; text-align: center;
        }
        .numero-gigante {
            font-size: 5rem; font-weight: bold; color: #0d6efd; line-height: 1;
        }
    </style>
</head>
<body>
    <a href="/admin/dashboard" class="btn-back">⬅ Volver</a>

    <div class="container">
        <div class="glass-card">
            <h2 class="mb-4">Trafico Web (Impacto de Pantalla Interactiva)</h2>
            <p class="text-muted fs-5">Visitantes totales que han escaneado el código QR en la sala de herpetología.</p>
            
            <div class="my-5">
                <div class="numero-gigante">{{ total_qr }}</div>
                <div class="text-uppercase fw-bold text-secondary mt-2">Escaneos Registrados</div>
            </div>
            
            <div class="alert alert-info" role="alert">
                Próximamente: Filtros de registro por fecha (HU 20).
            </div>
        </div>
    </div>
</body>
</html>
