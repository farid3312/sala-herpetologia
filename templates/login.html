<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Museo Herpetológico</title>
    <link rel="icon" href="{{ url_for('static', path='favicon.ico') }}" type="image/x-icon">
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Imagen de fondo para Login */
            background-image: url("{{ url_for('static', path='fondoLogin.webp') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
        }

        /* Botón de Inicio en la esquina superior izquierda */
        .btn-home {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #2c5364;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.3s;
            z-index: 1000;
        }

        .btn-home:hover {
            background-color: #1d3a47;
            transform: scale(1.05);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        h2 { margin-bottom: 20px; color: #2c5364; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
        }

        input:focus { border-color: #2c5364; }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2c5364;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn:hover { background: #0f2027; transform: translateY(-2px); }

        .error {
            background: #ffcccc;
            color: #990000;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        /* Ajustes para pantallas pequeñas */
        @media (max-width: 480px) {
            .login-card { padding: 25px; }
            .btn-home { padding: 8px 12px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <a href="/" class="btn-home">🏠 Inicio</a>
    <div class="login-card">
        <h2>Acceso Admin</h2>

         {% if error %}
         <div class="error">{{ error }}</div>
         {% endif %}

        <form action="/admin/login" method="POST">
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" name="correo" placeholder="admin@museo.com" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Ingresar al Panel</button>
        </form>
    </div>
</body>
</html>
