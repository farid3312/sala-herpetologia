<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salas del Museo</title>
    <link
      rel="icon"
      href="{{ url_for('static', path='favicon.ico') }}"
      type="image/x-icon"
    />
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-image: url("{{ url_for('static', path='fondo.webp') }}");

        /* --- FONDO RESTAURADO A PANTALLA COMPLETA --- */
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-color: #1a3644;

        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
        z-index: -1;
      }

      /* --- Botón de Administrador (Derecha) --- */
      .btn-admin {
        position: absolute;
        top: 20px;
        right: 20px;
        background-color: rgba(255, 255, 255, 0.2);
        color: white;
        text-decoration: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: bold;
        transition:
          background 0.3s,
          transform 0.2s;
        border: 1px solid rgba(255, 255, 255, 0.4);
        z-index: 100;
      }
      .btn-admin:hover {
        background-color: white;
        color: #2c5364;
        transform: scale(1.05);
      }

      /* --- Botón de Compartir (Izquierda) --- */
      .btn-compartir {
        position: absolute;
        top: 20px;
        left: 20px;
        background-color: #28a745;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        font-size: 1rem;
        transition: 0.3s;
        z-index: 100;
      }
      .btn-compartir:hover {
        background-color: #218838;
        transform: scale(1.05);
      }

      /* --- Estilos de la Ventana Emergente (Modal QR) --- */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
      }

      .modal-contenido {
        background-color: white;
        margin: 15vh auto;
        padding: 25px;
        border-radius: 15px;
        width: 90%;
        max-width: 320px;
        text-align: center;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
        position: relative;
      }

      .cerrar {
        position: absolute;
        top: 10px;
        right: 15px;
        color: #aaa;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
      }
      .cerrar:hover {
        color: #333;
      }

      #linkTexto {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        text-align: center;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
        background-color: #f9f9f9;
        color: #555;
      }

      .btn-copiar {
        width: 100%;
        padding: 10px;
        background-color: #2c5364;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }
      .btn-copiar:hover {
        background-color: #1d3a47;
      }

      /* Ajustes para celulares */
      @media (max-width: 600px) {
        .btn-admin,
        .btn-compartir {
          top: 10px;
          padding: 8px 15px;
          font-size: 0.9rem;
        }
        .btn-admin {
          right: 10px;
        }
        .btn-compartir {
          left: 10px;
        }
        .titulo-principal {
          margin-top: 60px;
        }
      }

      /* --- Estilos del contenido principal --- */
      .titulo-principal {
        color: white;
        background: rgba(44, 83, 100, 0.95);
        padding: 20px 40px;
        border-radius: 15px;
        text-align: center;
        margin-top: 40px;
        margin-bottom: 50px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
      }
      .titulo-principal h1 {
        margin: 0 0 10px 0;
      }
      .titulo-principal p {
        margin: 0;
        font-size: 1.1rem;
        opacity: 0.9;
      }

      .grid-salas {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        width: 100%;
        max-width: 1200px;
      }

      .sala-card {
        background: rgba(255, 255, 255, 0.95);
        padding: 30px 20px;
        border-radius: 15px;
        text-align: center;
        text-decoration: none;
        color: #2c5364;
        font-weight: bold;
        font-size: 1.2rem;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 80px;
        border: 3px solid transparent;
      }
      .sala-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5);
        border-color: #2c5364;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <button onclick="abrirModalCompartir()" class="btn-compartir">
      📤 Compartir
    </button>
    <a href="/admin/login" class="btn-admin">Acceso Admin</a>

    <div id="modalCompartir" class="modal">
      <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarModalCompartir()">&times;</span>
        <h3 style="color: #2c5364; margin-top: 0">Comparte el Museo</h3>

        <img
          id="qrCode"
          src=""
          alt="Código QR"
          style="width: 200px; height: 200px; margin: 15px 0"
        />

        <input type="text" id="linkTexto" readonly />
        <button onclick="copiarLink()" class="btn-copiar">Copiar Enlace</button>
      </div>
    </div>

    <div class="titulo-principal">
      <h1>Museo Interactivo</h1>
      <p>Selecciona una sala para comenzar tu exploración</p>
    </div>

    <div class="grid-salas">
      <a href="{{ url_for('galeria') }}" class="sala-card"
        >🐍 Sala de Herpetología</a
      >
      <a
        href="{{ url_for('sala_proximamente', nombre_sala='ornitologia') }}"
        class="sala-card"
        >🦅 Sala de Ornitología</a
      >
      <a
        href="{{ url_for('sala_proximamente', nombre_sala='entomologia') }}"
        class="sala-card"
        >🦋 Sala de Entomología</a
      >
      <a
        href="{{ url_for('sala_proximamente', nombre_sala='mastozoologia') }}"
        class="sala-card"
        >🐅 Sala de Mastozoología</a
      >
      <a
        href="{{ url_for('sala_proximamente', nombre_sala='paleontologia') }}"
        class="sala-card"
        >🦴 Sala de Geología y Paleontología</a
      >
      <a
        href="{{ url_for('sala_proximamente', nombre_sala='oceanografia') }}"
        class="sala-card"
        >🌊 Sala de Oceanografía</a
      >
      <a
        href="{{ url_for('sala_proximamente', nombre_sala='arqueologia') }}"
        class="sala-card"
        >🏺 Sala de Arqueología</a
      >
    </div>

    <script>
      function abrirModalCompartir() {
        var urlActual = window.location.href;
        // Uso de API externa para generar el QR dinámicamente
        var urlQR =
          "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" +
          encodeURIComponent(urlActual);

        document.getElementById("qrCode").src = urlQR;
        document.getElementById("linkTexto").value = urlActual;
        document.getElementById("modalCompartir").style.display = "block";
      }

      function cerrarModalCompartir() {
        document.getElementById("modalCompartir").style.display = "none";
      }

      function copiarLink() {
        var copyText = document.getElementById("linkTexto");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value);
        alert("¡Enlace copiado al portapapeles!");
      }

      window.onclick = function (event) {
        var modal = document.getElementById("modalCompartir");
        if (event.target == modal) {
          modal.style.display = "none";
        }
      };
    </script>
  </body>
</html>
