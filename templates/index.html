<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Herpetología</title>
    
    <link rel="icon" href="{{ url_for('static', path='favicon.ico') }}" type="image/x-icon">
    
    <style>
        /* Estilos base con imagen de fondo en Mosaico Pequeño */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url("{{ url_for('static', path='fondo detalle.png') }}");
            background-repeat: repeat; 
            
            /* AQUÍ ESTÁ EL CAMBIO: Forzamos a que la imagen sea pequeña (150px) para que se repita muchas veces */
            background-size: 450px; 
            
            background-attachment: fixed; 
            background-color: #2c5364; 
        }

        /* Barra de navegación superior */
        header {
            background-color: rgba(44, 83, 100, 0.95);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        /* Botón de Login en la esquina */
        .btn-admin {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .btn-admin:hover {
            background-color: white;
            color: #2c5364;
            transform: scale(1.05);
        }

        /* Contenedor de la Galería */
        .container {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        /* Fondo semitransparente para que el título se lea sobre la imagen */
        .titulo-galeria {
            text-align: center;
            color: #fff;
            background-color: rgba(44, 83, 100, 0.8);
            padding: 10px;
            border-radius: 10px;
            max-width: fit-content;
            margin: 0 auto 20px auto;
        }

        .galeria {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-top: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            width: 250px;
            text-align: center;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h3 {
            margin: 15px 0;
            color: #333;
        }

        .btn-ficha {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #2c5364;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        
        .btn-ficha:hover {
            background-color: #1d3a47;
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="{{ url_for('inicio') }}" class="btn-admin" style="background-color: #1d3a47;">🏠 Inicio</a>
            <h1>Sala de Herpetología</h1>
        </div>
    </header>

    <div class="container">
        <h2 class="titulo-galeria">Explora nuestra colección</h2>
        
        <div class="galeria">
            {% for especie in especies %}
            <div class="card">
                <img src="{{ especie.imagen_url }}" alt="{{ especie.nombre_comun }}">
                <h3>{{ especie.nombre_comun }}</h3>
                <a href="{{ url_for('detalle_especie', id_especie=especie.id) }}" class="btn-ficha">Ver Ficha Técnica</a>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
